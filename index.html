<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Druk Basket | Marketplace</title>
    <script src="auth.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --primary-green-dark: #1f4d38;
            --primary-green-soft: #edf7f1;
            --accent-gold: #f1c40f;
            --accent-orange: #f39c12;
            --earth-brown: #4a3728;
            --light-bg: #f6faf7;
            --card-bg: #ffffff;
            --text-dark: #21352b;
            --text-soft: #6f7f76;
            --border-soft: rgba(45, 106, 79, 0.14);
            --shadow-soft: 0 20px 45px rgba(25, 60, 42, 0.08);
            --shadow-card: 0 14px 30px rgba(20, 50, 32, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0) 24%),
                linear-gradient(180deg, #f4faf6 0%, #eef7f1 45%, #fbfdfb 100%);
            margin: 0;
            color: var(--text-dark);
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            padding: 16px 5%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 100;
            border-bottom: 1px solid rgba(45, 106, 79, 0.08);
        }
        .login-btn {
            background: #fff;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .login-btn:hover {
            background: var(--primary-green);
            color: #fff;
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 3px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .hamburger.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .navbar nav {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .navbar nav a {
            text-decoration: none;
            color: var(--earth-brown);
            font-weight: 600;
            font-size: 0.96rem;
            transition: color 0.2s ease;
        }

        .navbar nav a:hover {
            color: var(--primary-green);
        }

        .main-logo {
            height: 42px;
            display: block;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .live-logo-container {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-green-soft);
            padding: 9px 16px;
            border-radius: 14px;
            border: 1.5px solid rgba(45, 106, 79, 0.2);
            color: var(--primary-green);
            font-weight: 700;
            font-size: 0.86rem;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .live-logo-container:hover {
            background: rgba(45, 106, 79, 0.1);
            border-color: var(--primary-green);
            box-shadow: 0 4px 14px rgba(45, 106, 79, 0.12);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-green);
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .live-dot::after {
            content: "";
            position: absolute;
            top: -4px;
            left: -4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(45, 106, 79, 0.25);
            animation: livePulse 2s ease-in-out infinite;
        }

        .live-tag {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary-green);
        }

        @keyframes livePulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.8); opacity: 0; }
        }

        .hero-section {
            padding: 42px 5% 18px;
        }

        .hero-shell {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 24px;
            align-items: stretch;
            background: linear-gradient(135deg, #1f5c42 0%, #2d6a4f 45%, #4ca276 100%);
            color: #fff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }

        .hero-copy {
            padding: 42px;
            position: relative;
        }

        .hero-copy::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-weight: 700;
            font-size: 0.84rem;
            margin-bottom: 18px;
        }

        .hero-copy h1 {
            margin: 0 0 16px;
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            line-height: 1.08;
            max-width: 640px;
        }

        .hero-copy p {
            margin: 0;
            max-width: 620px;
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 28px;
            max-width: 680px;
        }

        .hero-stat {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 16px;
        }

        .hero-stat strong {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .hero-stat span {
            font-size: 0.86rem;
            color: rgba(255, 255, 255, 0.86);
        }

        .hero-panel {
            padding: 28px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
        }

        .hero-panel-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 22px;
            padding: 24px;
        }

        .hero-panel-card h2 {
            margin: 0 0 10px;
            font-size: 1.4rem;
        }

        .hero-panel-card p {
            margin: 0 0 18px;
            font-size: 0.95rem;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.9);
        }

        .hero-list {
            display: grid;
            gap: 12px;
        }

        .hero-list-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.92rem;
            line-height: 1.55;
            color: rgba(255, 255, 255, 0.92);
        }

        .hero-list-item span {
            flex-shrink: 0;
        }

        .search-panel-wrap {
            padding: 12px 5% 8px;
            position: sticky;
            top: 0;
            z-index: 99;
            background: linear-gradient(180deg, #f4faf6 0%, rgba(244, 250, 246, 0.95) 80%, rgba(244, 250, 246, 0) 100%);
            padding-bottom: 16px;
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid rgba(45, 106, 79, 0.08);
            border-radius: 22px;
            box-shadow: 0 14px 30px rgba(20, 50, 32, 0.05);
        }

        .filter-bar-top {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .filter-bar input {
            padding: 16px 18px;
            font-size: 17px;
            border: 1px solid #d6e2da;
            border-radius: 14px;
            width: 100%;
            color: var(--text-dark);
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .filter-bar input:focus {
            border-color: rgba(45, 106, 79, 0.45);
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.08);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-green-dark) 100%);
            color: white;
            border: none;
            padding: 16px 26px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 12px 24px rgba(31, 77, 56, 0.18);
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 12px 20px;
            border-radius: 999px;
            border: 2px solid #d6e2da;
            background: #fff;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }

        .cat-tab:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .cat-tab.active {
            background: var(--primary-green);
            color: #fff;
            border-color: var(--primary-green);
        }

        .product-count {
            padding: 14px 5% 0;
            font-size: 0.95rem;
            color: var(--text-soft);
            font-weight: 600;
        }

        .catalog-header {
            padding: 24px 5% 0;
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            flex-wrap: wrap;
        }

        .catalog-header h2 {
            margin: 0;
            font-size: 1.7rem;
            color: var(--text-dark);
        }

        .catalog-header p {
            margin: 8px 0 0;
            color: var(--text-soft);
            line-height: 1.6;
            max-width: 640px;
        }

        .catalog-chip {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--primary-green-soft);
            color: var(--primary-green);
            font-weight: 800;
            font-size: 0.88rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 16px 5% 60px;
            min-height: 400px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(45, 106, 79, 0.08);
            transition: transform 0.24s ease, box-shadow 0.24s ease;
            position: relative;
            box-shadow: var(--shadow-card);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 36px rgba(20, 50, 32, 0.12);
        }

        .product-link {
            display: block;
            color: inherit;
            text-decoration: none;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 18px 18px 16px;
        }

        .card-content.no-top {
            padding-top: 0;
        }

        .card h3 {
            margin: 0;
            font-size: 1.18rem;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text-dark);
        }

        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-green);
            margin: 8px 0 0;
        }

        .product-meta {
            display: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .btn-group button {
            border-radius: 14px;
            padding: 16px 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-group button:hover {
            transform: translateY(-1px);
        }

        .add-cart {
            background: var(--primary-green);
            color: #fff;
        }

        .preorder {
            background: #f0f0f0;
            color: var(--earth-brown);
            border: 1px solid #ddd;
        }

        .badge {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 7px 12px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 0.76rem;
            z-index: 1;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        .badge.organic { background: #2ecc71; color: white; }
        .badge.gi-tag { background: #f1c40f; color: #000; }
        .badge.gap { background: #3498db; color: white; }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            display: none;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            font-size: 1.08rem;
            color: #6b7c72;
            background: rgba(255, 255, 255, 0.8);
            border: 1px dashed #c9d8cf;
            border-radius: 20px;
        }

        .talkback-btn {
            border: none;
            cursor: pointer;
            padding: 16px 22px;
            border-radius: 16px;
            font-weight: 900;
            background: #f5f5f5;
            color: #222;
            box-shadow: 0 10px 28px rgba(0,0,0,0.28);
            font-size: 17px;
            letter-spacing: 0.01em;
        }

        .talkback-btn.on {
            background: var(--primary-green);
            color: white;
        }

        .talkback-btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        .talkback-float {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 9999;
        }

        @supports (padding: env(safe-area-inset-bottom)) {
            .talkback-float {
                bottom: calc(16px + env(safe-area-inset-bottom));
                right: calc(16px + env(safe-area-inset-right));
            }
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            background: var(--primary-green);
            color: #fff;
            padding: 14px 22px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            z-index: 9999;
            display: none;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 8px 24px rgba(31, 77, 56, 0.35);
        }

        /* ── Tablet ── */
        @media (max-width: 980px) {
            .hero-shell,
            .filter-bar {
                grid-template-columns: 1fr;
            }

            .hero-copy,
            .hero-panel {
                padding: 28px;
            }

            .hero-stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .navbar nav a {
                font-size: 0.9rem;
            }
        }

        /* ── Small tablet / large phone ── */
        @media (max-width: 720px) {
            .hamburger {
                display: flex;
            }

            .navbar {
                padding: 12px 14px;
                gap: 10px;
                flex-wrap: wrap;
            }
            .logo-container {
                flex: 0 0 auto;
            }

            .navbar nav {
                display: none;
                order: 3;
                width: 100%;
                flex-direction: column;
                align-items: center;
                gap: 0;
                border-top: 1px solid var(--border-soft);
                padding-top: 8px;
                margin-top: 4px;
            }

            .navbar nav.active {
                display: flex;
            }

            .navbar nav a {
                font-size: 0.95rem;
                padding: 12px 0;
                width: 100%;
                text-align: center;
                border-bottom: 1px solid var(--border-soft);
            }

            .navbar nav a:last-child {
                border-bottom: none;
            }

            .user-actions {
                gap: 10px;
            }

            .live-logo-container {
                padding: 5px 10px;
                font-size: 0.78rem;
            }

            .market-price {
                flex: 0 1 auto;
                gap: 10px;
                flex-wrap: nowrap;
                justify-content: flex-end;
            }

            .search-panel-wrap,
            .product-grid,
            .product-count,
            .catalog-header {
                padding-left: 14px;
                padding-right: 14px;
            }

            .filter-bar {
                padding: 14px;
                border-radius: 16px;
            }

            .filter-bar input {
                padding: 12px 14px;
                font-size: 15px;
                border-radius: 12px;
            }

            .search-btn {
                padding: 12px 18px;
                font-size: 14px;
                border-radius: 12px;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .card {
                border-radius: 16px;
            }

            .card img {
                height: 140px;
            }

            .card-content {
                padding: 12px 12px 10px;
            }

            .card h3 {
                font-size: 0.92rem;
            }

            .price {
                font-size: 1.1rem;
            }

            .btn-group button {
                padding: 12px 8px;
                font-size: 0.82rem;
                border-radius: 10px;
            }

            .badge {
                padding: 5px 9px;
                font-size: 0.68rem;
                top: 10px;
                left: 10px;
            }

            .card-footer {
                padding: 6px 12px 10px;
                font-size: 0.72rem;
            }

            .talkback-float {
                right: 12px;
                bottom: 12px;
            }

            .talkback-btn {
                padding: 12px 16px;
                font-size: 14px;
                border-radius: 12px;
            }

            .cat-tab {
                padding: 9px 14px;
                font-size: 0.84rem;
            }

            .catalog-header h2 {
                font-size: 1.3rem;
            }
        }

        /* ── Phone ── */
        @media (max-width: 480px) {
            .navbar {
                padding: 10px 12px;
                gap: 8px;
            }

            .main-logo {
                height: 34px;
            }

            .navbar nav {
                gap: 8px;
                overflow-x: auto;
                flex-wrap: nowrap;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
            }

            .navbar nav a {
                font-size: 0.8rem;
                white-space: nowrap;
            }

            .user-actions {
                gap: 8px;
                font-size: 0.85rem;
            }

            .filter-bar-top {
                grid-template-columns: 1fr;
            }

            .search-btn {
                width: 100%;
            }

            .category-tabs {
                gap: 6px;
            }

            .cat-tab {
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding-bottom: 80px;
            }

            .card img {
                height: 120px;
            }

            .card-content {
                padding: 10px 10px 8px;
            }

            .card h3 {
                font-size: 0.85rem;
                line-height: 1.25;
            }

            .price {
                font-size: 1rem;
                margin-top: 4px;
            }

            .btn-group {
                gap: 6px;
            }

            .btn-group button {
                padding: 10px 6px;
                font-size: 0.76rem;
            }

            .hero-section {
                padding: 20px 14px 10px;
            }

            .hero-copy {
                padding: 20px;
            }

            .hero-copy h1 {
                font-size: 1.6rem;
            }

            .hero-stats {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        /* ── Very small phone ── */
        @media (max-width: 360px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .card img {
                height: 180px;
            }

            .card h3 {
                font-size: 0.95rem;
            }

            .price {
                font-size: 1.15rem;
            }

            .btn-group button {
                padding: 12px 10px;
                font-size: 0.85rem;
            }
        }


        /* ── Card entrance animation ── */
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: cardFadeIn 0.35s ease both;
        }

        /* ── Product footer label ── */
        .card-footer {
            padding: 8px 18px 14px;
            font-size: 0.8rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 5px;
        }

    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="/drukbasket/Images/logo.png" alt="Drukbasket Logo" class="main-logo">
        </div>

        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="nav-menu">
            <a href="index.html">Marketplace</a>
            <a href="aboutUs.html">About Us</a>
            <a href="contactUs.html">Contact Us</a>
        </nav>

        <div class="user-actions">
            <a href="market-prices.html" style="text-decoration: none;">
                <div class="live-logo-container">
                    <div class="live-dot"></div>
                    <span class="market-price">Market Prices</span>
                    <span class="live-tag">Live</span>
                </div>
            </a>

            <a href="/Dzongkha/index.html" style="text-decoration: none;">DZ</a>

            <div class="cart-container" style="position: relative; display: inline-block; cursor: pointer;"
                onclick="window.location.href='/drukbasket/AddtoCart/addToCart.html'">
                <span class="cart" style="font-size: 1.5rem;">🛒</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>

            <span class="notification" role="button" aria-label="Notifications">🔔</span>

            <button class="login-btn" onclick="window.location.href='login.html'">LOG IN</button>
        </div>
    </header>

    <section class="search-panel-wrap">
        <div class="filter-bar">
            <div class="filter-bar-top">
                <input type="text" id="productSearch" placeholder="🔍  Search (e.g. Chilli, Rice, Honey)">
                <button class="search-btn" type="button">Search</button>
            </div>
            <div class="category-tabs" role="group" aria-label="Filter by category">
                <button class="cat-tab active" data-cat="all">All</button>
                <button class="cat-tab" data-cat="Organic">🌿 Organic</button>
                <button class="cat-tab" data-cat="GI Tag">🏷️ GI Tag</button>
                <button class="cat-tab" data-cat="GAP">✅ GAP</button>
            </div>
        </div>
    </section>

    <p class="product-count" id="product-count"></p>

    <main class="product-grid" id="product-grid"></main>

    <div id="toast" class="toast"></div>

    <button id="talkbackToggle" class="talkback-btn talkback-float" type="button" title="Talk Back for farmers">
        🔈 Talk Back: OFF
    </button>

            { name: "Turnip", price: "25", unit: "Kg", badge: "GI Tag", img: "https://images.unsplash.com/photo-1506806732259-39c2d4ad310c?w=300" },

            { name: "Dried Chilli", price: "450", unit: "Kg", badge: "GAP", img: "https://images.unsplash.com/photo-1514537022378-5a21034f8101?w=300" },
            { name: "Bamboo Shoot", price: "150", unit: "Jar", badge: "Organic", img: "https://images.unsplash.com/photo-1596515298514-638069678122?w=300" },
            { name: "Fern (Nakay)", price: "60", unit: "Bundle", badge: "GI Tag", img: "https://images.unsplash.com/photo-1492496913980-50134c7a268a?w=300" },
            { name: "Lemon", price: "5", unit: "Pc", badge: "GAP", img: "https://images.unsplash.com/photo-1590502593747-42a996133562?w=300" },
            { name: "Banana", price: "120", unit: "Doz", badge: "Organic", img: "https://images.unsplash.com/photo-1571771894821-ad9902410947?w=300" },
            { name: "Orange", price: "200", unit: "Kg", badge: "GI Tag", img: "https://images.unsplash.com/photo-1582979512210-99b6a53386f9?w=300" },
            { name: "Curd (Datshi)", price: "180", unit: "Kg", badge: "GAP", img: "https://images.unsplash.com/photo-1559561853-08451507cbe7?w=300" },
            { name: "Tumeric Powder", price: "100", unit: "Pkt", badge: "Organic", img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=300" },
            { name: "Coriander", price: "20", unit: "Bundle", badge: "GI Tag", img: "https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=300" },
            { name: "Mint Leaves", price: "30", unit: "Bundle", badge: "GAP", img: "Images/mint.jpg" },
            { name: "Dried Bitter Gourd", price: "300", unit: "Kg", badge: "Organic", img: "https://images.unsplash.com/photo-1449339044511-d14d2ba8294b?w=300" },
            { name: "Cinnamon Sticks", price: "150", unit: "Pkt", badge: "GI Tag", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=300" }
        ];

        function escapeAttr(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        const grid = document.getElementById('product-grid');
        const searchInput = document.getElementById('productSearch');
        const categoryTabs = document.querySelectorAll('.cat-tab');
        const productCountEl = document.getElementById('product-count');
        const talkBtn = document.getElementById('talkbackToggle');
        const toast = document.getElementById('toast');
        let selectedCat = 'all';
        let talkEnabled = localStorage.getItem('talkBackEnabled') === '1';

        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                categoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedCat = tab.dataset.cat;
                updateDisplay();
            });
        });

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => toast.style.display = 'none', 1600);
        }

        function setTalkUI() {
            if (talkEnabled) talkBtn.classList.add('on');
            else talkBtn.classList.remove('on');
            talkBtn.innerText = talkEnabled ? "🔊 Talk Back: ON" : "🔈 Talk Back: OFF";
        }

        function stopTalking() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        function speak(text) {
            if (!talkEnabled) return;
            if (!('speechSynthesis' in window)) {
                alert("Talk Back is not supported on this device/browser.");
                talkEnabled = false;
                localStorage.setItem('talkBackEnabled', '0');
                setTalkUI();
                return;
            }
            stopTalking();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.95;
            u.pitch = 1;
            u.volume = 1;
            window.speechSynthesis.speak(u);
        }

        function buildFarmerTalk(p) {
            const n = (p.name || "").toString();
            const b = (p.badge || "").toString();
            const priceText = `Nu ${p.price} per ${p.unit}`;

            let badgeText = "";
            if (b.toLowerCase() === "organic") badgeText = "Certified Organic. No chemical.";
            else if (b.toLowerCase() === "gi tag") badgeText = "GI Tag. Local authentic product.";
            else if (b.toLowerCase() === "gap") badgeText = "GAP. Good farming practice.";
            else if (b) badgeText = `${b}.`;

            return `${n}. Price ${priceText}. ${badgeText} If you want to buy, press Add to Cart.`;
        }

        function talkWelcome() {
            speak("Kuzu zangpo Gara lu. Welcome to Druk Basket. Type key word in search area. Or choose category. Tap product to hear price. Press Add to Cart to buy. Press Preorder to advance demand the product");
        }

        talkBtn.addEventListener('click', () => {
            talkEnabled = !talkEnabled;
            localStorage.setItem('talkBackEnabled', talkEnabled ? '1' : '0');
            setTalkUI();
            showToast(talkEnabled ? "Talk Back ON" : "Talk Back OFF");
            if (talkEnabled) talkWelcome();
            else stopTalking();
        });

        setTalkUI();

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function updateDisplay() {
            const searchText = searchInput.value.toLowerCase();
            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchText);
                const matchesCategory = (selectedCat === "all") || (p.badge === selectedCat);
                return matchesSearch && matchesCategory;
            });
            productCountEl.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
            renderGrid(filtered);

            if (talkEnabled) {
                const catText = selectedCat === "all" ? "all categories" : selectedCat;
                speak(`Showing ${filtered.length} products for ${catText}.`);
            }
        }

        function renderGrid(data) {
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = `<div class="no-results">No products found matching your criteria.</div>`;
                if (talkEnabled) speak("No products found. Please clear search or choose different category.");
                return;
            }

            grid.innerHTML = data.map((p, i) => {
                const params = new URLSearchParams({
                    name: p.name,
                    price: p.price,
                    unit: p.unit,
                    img: p.img,
                    badge: p.badge || ""
                }).toString();

                const safeBadge = (p.badge || "").toLowerCase().replace(' ', '-');
                const delay = Math.min(i * 0.05, 0.6).toFixed(2);

                return `
                    <div class="card"
                         style="animation-delay: ${delay}s"
                         data-name="${escapeAttr(p.name)}"
                         data-price="${escapeAttr(p.price)}"
                         data-unit="${escapeAttr(p.unit)}"
                         data-badge="${escapeAttr(p.badge || '')}"
                         data-img="${escapeAttr(p.img)}"
                         tabindex="0"
                         role="button"
                         aria-label="Product ${escapeAttr(p.name)}">
                        <a href="Product/product.html?${params}" class="product-link">
                            ${p.badge ? `<span class="badge ${safeBadge}">${escapeAttr(p.badge)}</span>` : ''}
                            <img src="${escapeAttr(p.img)}" alt="${escapeAttr(p.name)}">
                            <div class="card-content">
                                <h3>${escapeAttr(p.name)}</h3>
                                <p class="price">Nu. ${escapeAttr(p.price)} /${escapeAttr(p.unit)}</p>
                            </div>
                        </a>
                        <div class="card-content no-top">
                            <div class="btn-group">
                                <button class="add-cart" data-action="cart">🛒 Add to Cart</button>
                                <button class="preorder" data-action="preorder">📦 Preorder</button>
                            </div>
                        </div>
                        <div class="card-footer">🌾 Bhutanese Product</div>
                    </div>
                `;
            }).join('');

            attachCardTalkBackHandlers();
        }

        function attachCardTalkBackHandlers() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const price = card.getAttribute('data-price');
                const unit = card.getAttribute('data-unit');
                const badge = card.getAttribute('data-badge') || "";
                const img = card.getAttribute('data-img') || "";
                const message = buildFarmerTalk({ name, price, unit, badge });

                card.addEventListener('click', (e) => {
                    const btn = e.target.closest('button');
                    if (btn) {
                        if (btn.dataset.action === 'cart') {
                            addToCart(name, price, unit, img, badge);
                        } else if (btn.dataset.action === 'preorder') {
                            window.location.href = '/Preorder/preorder.html';
                        }
                        return;
                    }
                    speak(message);
                });

                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        speak(message);
                    }
                });
            });
        }

        searchInput.addEventListener('input', updateDisplay);
        document.querySelector('.search-btn').addEventListener('click', updateDisplay);

        function updateBadge() {
            const cart = JSON.parse(localStorage.getItem('drukCart')) || [];
            const cartBadge = document.getElementById('cart-count');
            if (cartBadge) {
                cartBadge.innerText = cart.length;
                cartBadge.style.display = cart.length > 0 ? 'block' : 'none';
            }
        }

        function addToCart(name, price, unit, img, badge) {
            let cartItems = JSON.parse(localStorage.getItem('drukCart')) || [];
            const existingItem = cartItems.find(item => item.name === name);
            let targetItem;
            if (existingItem) {
                existingItem.qty++;
                targetItem = existingItem;
            } else {
                targetItem = {
                    name, price, img, unit,
                    badge: badge || "Organic",
                    qty: 1,
                    selected: true,
                    timestamp: Date.now()
                };
                cartItems.push(targetItem);
            }
            localStorage.setItem('drukCart', JSON.stringify(cartItems));
            updateBadge();
            processCheckoutSimulation(targetItem);
            showToast(`✅ ${name} added! Great choice 🌿`);
            speak(`${name} added to cart. Price Nu ${price} per ${unit}. Open cart from top to checkout.`);
        }

        function processCheckoutSimulation(item) {
            const orders = JSON.parse(localStorage.getItem('pendingOrders')) || [];
            orders.push({ ...item, timestamp: Date.now() });
            localStorage.setItem('pendingOrders', JSON.stringify(orders));
        }

        const ALLOWED_BADGES = ["Organic", "GI Tag", "GAP"];

        function sanitizeApprovedProduct(ap) {
            const name = String(ap.name || "").trim().slice(0, 100);
            const price = String(parseFloat(ap.price) || 0);
            const unit = String(ap.unit || "").trim().slice(0, 30);
            const badge = ALLOWED_BADGES.includes(ap.badge) ? ap.badge : "Organic";
            const imgStr = String(ap.img || "");
            const img = (/^https?:\/\//.test(imgStr) || imgStr.startsWith("Images/")) ? imgStr : "";
            return { name, price, unit, badge, img };
        }

        function loadApprovedProducts() {
            const approvedProducts = JSON.parse(localStorage.getItem('approvedFarmerProducts')) || [];
            approvedProducts.forEach(ap => {
                const safe = sanitizeApprovedProduct(ap);
                if (safe.name && !products.find(p => p.name === safe.name)) {
                    products.push(safe);
                }
            });
        }

        loadApprovedProducts();
        shuffleArray(products);
        updateDisplay();
        updateBadge();

        if (talkEnabled) setTimeout(talkWelcome, 600);

        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            navMenu.classList.toggle('active');
        });
    </script>
