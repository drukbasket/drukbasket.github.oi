<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GI QR Code Generator - Bhutanese Orange</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        .qr-wrapper {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            margin: 15px 0;
        }
        #qr-canvas { display: block; margin: 0 auto; }
        .product-info {
            background: #f0f7f2;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.85rem;
        }
        .product-info strong { color: #1e8e3e; }
        .badge {
            display: inline-block;
            background: #e6f4ea;
            color: #1e8e3e;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #1557b0; }
        .btn-secondary {
            background: #34a853;
        }
        .btn-secondary:hover { background: #2d9249; }
        select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>GI QR Code Generator</h2>
        <p class="subtitle">Generate QR codes for GI-tagged Bhutanese products</p>

        <select id="product-select" onchange="generateQR()">
            <option value="GI-BT-ORANGE-001">Bhutanese Mandarin Orange (GI-BT-ORANGE-001)</option>
            <option value="GI-BT-DOMA-001">Bhutanese Areca Nut / Doma (GI-BT-DOMA-001)</option>
            <option value="IMPORT-ORANGE-FAKE-099">Imported Orange - Non-GI (IMPORT-ORANGE-FAKE-099)</option>
            <option value="IMPORT-ARECA-FAKE-099">Imported Areca Nut - Non-GI (IMPORT-ARECA-FAKE-099)</option>
        </select>

        <div class="qr-wrapper">
            <div id="qr-canvas"></div>
        </div>

        <div id="product-info" class="product-info"></div>

        <button onclick="downloadQR()">Download QR Code (PNG)</button>
        <br>
        <button class="btn-secondary" onclick="printQR()">Print QR Label</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const products = {
            "GI-BT-ORANGE-001": {
                name: "Bhutanese Mandarin Orange",
                origin: "Tsirang, Bhutan",
                verified: true,
                details: "Hand-picked organic mandarin oranges from 600-1700m altitude orchards. November-January harvest."
            },
            "GI-BT-DOMA-001": {
                name: "Bhutanese Areca Nut (Doma)",
                origin: "Phuntsholing Foothills",
                verified: true,
                details: "Mature, heavy nuts (18-25g) from healthy trees. August-December harvest."
            },
            "IMPORT-ORANGE-FAKE-099": {
                name: "Imported Orange (Non-GI)",
                origin: "Unknown / Non-GI Source",
                verified: false,
                details: "Non-authentic. Fails altitude origin criteria and lacks GI nursery traceability."
            },
            "IMPORT-ARECA-FAKE-099": {
                name: "Imported Areca Nut (Non-GI)",
                origin: "Unknown / Non-GI Source",
                verified: false,
                details: "Non-authentic. Fails weight criteria (below 18g) and lacks local nursery traceability."
            }
        };

        let qrInstance = null;

        function generateQR() {
            const select = document.getElementById('product-select');
            const code = select.value;
            const product = products[code];

            // Clear previous QR
            const container = document.getElementById('qr-canvas');
            container.innerHTML = '';

            // Generate QR code using qrcodejs
            qrInstance = new QRCode(container, {
                text: code,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });

            // Update product info
            const infoDiv = document.getElementById('product-info');
            const badge = product.verified
                ? '<span class="badge">&#10003; GI VERIFIED</span>'
                : '<span class="badge" style="background:#fce8e6;color:#d93025;">&#9888; NON-GI</span>';
            infoDiv.innerHTML = badge +
                '<p><strong>Product:</strong> ' + product.name + '</p>' +
                '<p><strong>Origin:</strong> ' + product.origin + '</p>' +
                '<p><strong>QR Data:</strong> ' + code + '</p>' +
                '<p><strong>Details:</strong> ' + product.details + '</p>';
        }

        function downloadQR() {
            const container = document.getElementById('qr-canvas');
            const select = document.getElementById('product-select');
            // qrcodejs creates a canvas and an img inside the container
            const canvas = container.querySelector('canvas');
            const img = container.querySelector('img');
            const link = document.createElement('a');
            link.download = select.value + '-qr-code.png';
            if (canvas) {
                link.href = canvas.toDataURL('image/png');
            } else if (img) {
                link.href = img.src;
            }
            link.click();
        }

        function printQR() {
            const container = document.getElementById('qr-canvas');
            const canvas = container.querySelector('canvas');
            const img = container.querySelector('img');
            const imgSrc = canvas ? canvas.toDataURL('image/png') : (img ? img.src : '');
            const select = document.getElementById('product-select');
            const product = products[select.value];
            const win = window.open('', '_blank');
            win.document.write(
                '<html><head><title>GI QR Label</title>' +
                '<style>body{text-align:center;font-family:Segoe UI,sans-serif;padding:20px;}' +
                '.label{border:2px solid #333;border-radius:10px;padding:20px;display:inline-block;max-width:300px;}' +
                'h3{margin:10px 0 5px;}p{margin:3px 0;font-size:0.85rem;color:#555;}</style></head><body>' +
                '<div class="label">' +
                '<img src="' + imgSrc + '" width="200"><br>' +
                '<h3>' + product.name + '</h3>' +
                '<p>Origin: ' + product.origin + '</p>' +
                '<p style="font-size:0.75rem;color:#999;">' + select.value + '</p>' +
                '<p style="margin-top:8px;font-size:0.7rem;color:#1e8e3e;font-weight:bold;">GI Certified - Bhutan</p>' +
                '</div>' +
                '<script>setTimeout(function(){window.print();},500);<\/script></body></html>'
            );
        }

        // Generate on page load
        generateQR();
    </script>
</body>
</html>
