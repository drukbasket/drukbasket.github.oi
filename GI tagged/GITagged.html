<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhutan GI Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        .scanner-box { width: 100%; height: 250px; background: #111; margin: 20px 0; border-radius: 15px; position: relative; overflow: hidden; border: 3px solid #333; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #preview-img { max-width: 100%; max-height: 100%; display: none; z-index: 2; border-radius: 10px; }
        .viewfinder-text { color: #888; position: absolute; z-index: 1; pointer-events: none; font-size: 0.9rem; }
        .laser { width: 100%; height: 4px; background: #00ff88; position: absolute; box-shadow: 0 0 15px #00ff88; display: none; z-index: 3; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanning .laser { display: block; animation: scan 1.5s infinite alternate linear; }
        button { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.3s; margin-bottom: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result-card { margin-top: 25px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .map-container { margin-top: 15px; width: 100%; height: 300px; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .badge-success { background: #e6f4ea; color: #1e8e3e; }
        .badge-fail { background: #fce8e6; color: #d93025; }
        .report-btn { background: #d93025; font-size: 0.8rem; padding: 10px; }
        .hidden { display: none; }

#scan-status { font-size: 0.85rem; color: #666; margin-top: 5px; min-height: 20px; }
        .status-error { color: #d93025 !important; font-weight: bold; }
        .status-success { color: #1e8e3e !important; font-weight: bold; }

        .mode-toggle { display: flex; gap: 8px; margin-bottom: 15px; }
        .mode-toggle button { flex: 1; padding: 10px; font-size: 0.85rem; border-radius: 25px; }
        .mode-toggle button.active { background: #1a73e8; }
        .mode-toggle button:not(.active) { background: #e0e0e0; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>GI Product Authenticator</h2>
        <p style="font-size: 0.9rem;">Scan a QR code to verify product authenticity</p>

        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px;">
          <label style="font-size: 0.85rem; font-weight: 600; color: #555;">Voice Assistance</label>
          <label style="position: relative; display: inline-block; width: 44px; height: 24px; cursor: pointer;">
            <input type="checkbox" id="talkback-toggle" checked style="opacity: 0; width: 0; height: 0;">
            <span style="position: absolute; inset: 0; background: #ccc; border-radius: 24px; transition: 0.3s;"></span>
            <span id="talkback-knob" style="position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s;"></span>
          </label>
        </div>

        <div class="mode-toggle">
            <button id="mode-camera" class="active" onclick="setMode('camera')">Camera Scan</button>
            <button id="mode-upload" onclick="setMode('upload')">Upload QR Image</button>
        </div>

        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">

        <div id="scanner-container" class="scanner-box" onclick="handleScannerClick()">
            <div class="laser"></div>
            <div id="v-text" class="viewfinder-text">Tap to start camera...</div>
            <video id="camera-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover; display:none; z-index:2;"></video>
            <img id="preview-img" alt="Product Preview">
            <canvas id="scan-canvas" class="hidden"></canvas>
        </div>

        <button id="scan-btn" onclick="startScan()" disabled>Scan QR Code</button>
        <div id="scan-status"></div>

        <div id="result-card" class="hidden">
            <div id="badge-container"></div>
            <h3 id="product-name" style="margin: 5px 0;"></h3>
            <p id="product-origin" style="font-size: 0.9rem; color: #666;"></p>
            <p id="product-id" style="font-size: 0.75rem; color: #999;"></p>
            <div id="process-details"></div>

            <div id="map-section" class="map-container">
                <div id="map"></div>
            </div>
            <div id="action-section" style="margin-top: 15px;"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let map;
        let marker;
        let currentMode = 'camera';
        let cameraStream = null;
        let scanning = false;

        // Product database keyed by QR code content
        const giDatabase = {
            "GI-BT-DOMA-001": {
                name: "Bhutanese Areca Nut (Doma)",
                isVerified: true,
                origin: "Phuntsholing Foothills",
                lat: 26.85, lng: 89.38,
                giId: "GI-BT-DOMA-001",
                process: {
                    sourcing: "Mature, heavy nuts (18–25g) from healthy trees[cite: 5, 8].",
                    nursery: "Seeds soaked 24–48 hours; 6–12 month nursery period[cite: 13, 19].",
                    harvest: "August–December harvest using sharp tools[cite: 61, 63].",
                    storage: "Stored at 15–25°C on wooden pallets[cite: 82, 85]."
                }
            },
            "GI-BT-ORANGE-001": {
                name: "Bhutanese Mandarin Orange",
                isVerified: true,
                origin: "Tsirang, Bhutan",
                lat: 27.02, lng: 90.12,
                giId: "GI-BT-ORANGE-001",
                process: {
                    sourcing: "Hand-picked Bhutanese mandarin oranges from organic orchards at 600–1700m altitude.",
                    nursery: "Seedlings grafted from certified GI mother trees; 12–18 month nursery before transplanting.",
                    harvest: "November–January harvest at peak ripeness; only fruits 55–75mm diameter selected.",
                    storage: "Stored at 5–8°C in ventilated crates; shelf life 2–4 weeks without chemical treatment."
                }
            },
            "IMPORT-ORANGE-FAKE-099": {
                name: "Imported Orange (Non-GI)",
                isVerified: false,
                origin: "Unknown / Non-GI Source",
                lat: 27.00, lng: 90.00,
                giId: "IMPORT-ORANGE-FAKE-099",
                process: {
                    reason: "Fails altitude origin criteria and lacks GI nursery traceability. Chemical wax coating detected."
                }
            },
            "IMPORT-ARECA-FAKE-099": {
                name: "Imported Areca Nut",
                isVerified: false,
                origin: "Unknown / Non-GI Source",
                lat: 26.00, lng: 89.00,
                giId: "IMPORT-ARECA-FAKE-099",
                process: {
                    reason: "Fails weight criteria (below 18g) and lacks local nursery traceability[cite: 8, 19]."
                }
            }
        };

        // ── Mode switching ──
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-camera').classList.toggle('active', mode === 'camera');
            document.getElementById('mode-upload').classList.toggle('active', mode === 'upload');

            stopCamera();
            const img = document.getElementById('preview-img');
            img.style.display = 'none';
            document.getElementById('camera-preview').style.display = 'none';
            document.getElementById('v-text').style.display = 'block';
            document.getElementById('v-text').textContent = mode === 'camera' ? 'Tap to start camera...' : 'Tap to upload QR image...';
            document.getElementById('scan-btn').disabled = true;
            document.getElementById('scan-btn').innerText = 'Scan QR Code';
            document.getElementById('scan-status').textContent = '';
            document.getElementById('result-card').classList.add('hidden');
            speak('Switched to ' + (mode === 'camera' ? 'camera scan' : 'upload') + ' mode');
        }

        function handleScannerClick() {
            if (currentMode === 'upload') {
                document.getElementById('file-input').click();
            } else {
                startCamera();
            }
        }

        // ── Camera mode ──
        async function startCamera() {
            if (cameraStream) return; // already running
            try {
                const video = document.getElementById('camera-preview');
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = cameraStream;
                video.style.display = 'block';
                document.getElementById('v-text').style.display = 'none';
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('scan-btn').disabled = false;
                document.getElementById('scan-btn').innerText = 'Scan QR Code';
                document.getElementById('scan-status').textContent = 'Camera ready. Point at a QR code and tap Scan.';
                speak('Camera ready. Point at a QR code and tap Scan.');
            } catch (err) {
                document.getElementById('scan-status').innerHTML = '<span class="status-error">Camera access denied. Switch to Upload mode.</span>';
                speak('Camera access denied. Please switch to upload mode.');
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
                document.getElementById('camera-preview').style.display = 'none';
                document.getElementById('camera-preview').srcObject = null;
            }
            scanning = false;
        }

        // ── File upload mode ──
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('v-text').style.display = 'none';
                document.getElementById('scan-btn').disabled = false;
                document.getElementById('scan-btn').innerText = 'Scan QR Code';
                document.getElementById('scan-status').textContent = 'Image loaded. Tap Scan to decode QR code.';
                document.getElementById('result-card').classList.add('hidden');
            };
            reader.readAsDataURL(file);
            // Reset so the same file can be re-selected
            event.target.value = '';
        }

        // ── Scanning ──
        function startScan() {
            const btn = document.getElementById('scan-btn');
            const scanner = document.getElementById('scanner-container');
            const status = document.getElementById('scan-status');

            btn.disabled = true;
            btn.innerText = "Scanning for QR Code...";
            scanner.classList.add('scanning');
            status.textContent = 'Analyzing image for QR codes...';
            speak('Scanning for QR code. Please wait.');

            setTimeout(() => {
                let qrData = null;

                if (currentMode === 'camera') {
                    qrData = decodeFromVideo();
                } else {
                    qrData = decodeFromImage();
                }

                scanner.classList.remove('scanning');

                if (qrData) {
                    // Clean the decoded data: trim whitespace and remove invisible characters
                    qrData = qrData.trim().replace(/[^\x20-\x7E]/g, '');

                    // Try exact match first, then case-insensitive match
                    let product = giDatabase[qrData];
                    if (!product) {
                        const matchKey = Object.keys(giDatabase).find(k => k.toUpperCase() === qrData.toUpperCase());
                        if (matchKey) {
                            qrData = matchKey;
                            product = giDatabase[matchKey];
                        }
                    }

                    if (product) {
                        status.innerHTML = '<span class="status-success">QR decoded: ' + qrData + '</span>';
                        speak('QR code decoded successfully. ' + qrData);
                        showResult(product);
                    } else {
                        // Show raw bytes for debugging
                        const rawBytes = Array.from(qrData).map(c => c.charCodeAt(0));
                        status.innerHTML = '<span class="status-error">QR code "' + qrData + '" not found in GI registry.<br><small>Raw chars: [' + rawBytes.join(', ') + ']</small></span>';
                        speak('QR code not found in the GI registry.');
                        document.getElementById('result-card').classList.add('hidden');
                    }
                } else {
                    status.innerHTML = '<span class="status-error">No QR code detected. Try a clearer image.</span>';
                    speak('No QR code detected. Please try a clearer image.');
                    document.getElementById('result-card').classList.add('hidden');
                }

                btn.disabled = false;
                btn.innerText = 'Scan Again';
            }, 1500);
        }

        function decodeFromVideo() {
            const video = document.getElementById('camera-preview');
            if (!video.srcObject || video.videoWidth === 0) return null;

            const canvas = document.getElementById('scan-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(video, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
            return code ? code.data : null;
        }

        function decodeFromImage() {
            const img = document.getElementById('preview-img');
            if (!img.src || img.naturalWidth === 0) return null;

            const canvas = document.getElementById('scan-canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
            return code ? code.data : null;
        }

        // ── Display result ──
        function showResult(product) {
            const resultCard = document.getElementById('result-card');
            const badgeCont = document.getElementById('badge-container');
            const processDiv = document.getElementById('process-details');
            const actionDiv = document.getElementById('action-section');

            resultCard.classList.remove('hidden');
            processDiv.innerHTML = '';
            actionDiv.innerHTML = '';

            document.getElementById('product-name').innerText = product.name;
            document.getElementById('product-origin').innerText = "Source: " + product.origin;
            document.getElementById('product-id').innerText = "QR ID: " + product.giId;

            if (product.isVerified) {
                badgeCont.innerHTML = '<span class="badge badge-success">&#10003; ORIGIN VERIFIED</span>';
                setTimeout(() => speak('Origin verified. ' + product.name + '. Source: ' + product.origin), 1500);
                processDiv.innerHTML =
                    '<div style="margin-top: 10px; font-size: 0.8rem; background: #f0f7f2; padding: 10px; border-radius: 8px;">' +
                        '<b>Verified Standards:</b>' +
                        '<ul style="margin: 5px 0; padding-left: 15px;">' +
                            '<b>Sourcing:</b> ' + product.process.sourcing + '<br>' +
                            '<hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">' +
                            '<b>Nursery:</b> ' + product.process.nursery + '<br>' +
                            '<hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">' +
                            '<b>Harvest:</b> ' + product.process.harvest + '<br>' +
                            '<hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">' +
                            '<b>Storage:</b> ' + product.process.storage +
                        '</ul>' +
                    '</div>';
                document.getElementById('map-section').style.display = 'block';
            } else {
                badgeCont.innerHTML = '<span class="badge badge-fail">&#9888; AUTHENTICATION FAILED</span>';
                setTimeout(() => speak('Warning. Authentication failed. ' + product.name + '. ' + product.process.reason), 1500);
                processDiv.innerHTML =
                    '<div style="margin-top: 10px; font-size: 0.8rem; background: #fff1f0; padding: 10px; border-radius: 8px; border: 1px solid #ffa39e;">' +
                        '<b>Rejection Reason:</b> ' + product.process.reason +
                    '</div>';
                actionDiv.innerHTML = '<button class="report-btn">Report Counterfeit to BAFRA</button>';
                document.getElementById('map-section').style.display = 'none';
            }

            if (product.isVerified) {
                if (!map) {
                    map = L.map('map').setView([product.lat, product.lng], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                } else {
                    map.setView([product.lat, product.lng], 12);
                }
                setTimeout(function() { map.invalidateSize(); }, 200);
                if (marker) map.removeLayer(marker);
                marker = L.marker([product.lat, product.lng]).addTo(map).bindPopup(product.name).openPopup();
            }
        }

        // ── Talkback / Voice Assistance ──
        const talkbackToggle = document.getElementById('talkback-toggle');
        const talkbackKnob = document.getElementById('talkback-knob');

        talkbackToggle.addEventListener('change', () => {
          const on = talkbackToggle.checked;
          talkbackKnob.style.left = on ? '22px' : '2px';
          talkbackToggle.previousElementSibling.style.background = on ? '#1a73e8' : '#ccc';
          if (on) speak('Voice assistance enabled');
        });
        // Set initial style
        talkbackKnob.style.left = '22px';
        talkbackToggle.previousElementSibling.style.background = '#1a73e8';

        function speak(text) {
          if (!talkbackToggle.checked) return;
          if (!window.speechSynthesis) return;
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 0.9;
          utterance.pitch = 1;
          utterance.lang = 'en-US';
          // Some browsers need a small delay after cancel
          setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
        }

    </script>
</body>
</html>
